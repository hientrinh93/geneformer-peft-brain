model_name: "ctheodoris/Geneformer"
output_dir: "./results/geneformer_peft_brain"

data:
  train_path: "data/brain_cellxgene_train.h5ad"
  val_path: "data/brain_cellxgene_validation.h5ad"
  test_path: "data/brain_cellxgene_test.h5ad"
  label_column: "cell_type"          # Change to your actual label column name

peft:
  method: "qlora"                    # Options: qlora, lora, dora, pissa, olora
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules: "all-linear"       # Recommended for Geneformer
  use_dora: false
  init_lora_weights: "pissa"         # "pissa", "olora", or null

training:
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  num_train_epochs: 4
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true

  save_steps: 200
  eval_steps: 200
  logging_steps: 50

wandb:
  enabled: true
  project: "geneformer-peft-brain"
  run_name: "qlora-brain-run-1"
